name: Auto Release on main

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create tag and release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: latest_tag
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=${LATEST:-v0.0.0}" >> $GITHUB_OUTPUT

      - name: Determine version bump from commits
        id: next_tag
        run: |
          LATEST="${{ steps.latest_tag.outputs.tag }}"
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)

          # 마지막 태그 이후 커밋 메시지 수집
          COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s")
          echo "Commits since ${LATEST}:"
          echo "$COMMITS"

          # BREAKING CHANGE 또는 feat!: → major
          if echo "$COMMITS" | grep -qiE '(BREAKING CHANGE|^feat!:|^fix!:|^refactor!:)'; then
            NEXT="v$((MAJOR + 1)).0.0"
            BUMP="major"
          # feat: → minor
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            NEXT="v${MAJOR}.$((MINOR + 1)).0"
            BUMP="minor"
          # fix:, perf:, refactor:, style:, chore:, ci:, docs: → patch
          else
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            BUMP="patch"
          fi

          echo "Bump type: ${BUMP} → ${NEXT}"
          echo "tag=${NEXT}" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.next_tag.outputs.tag }} -m "${{ steps.next_tag.outputs.tag }}"
          git push origin ${{ steps.next_tag.outputs.tag }}

      - name: Create release with auto-generated notes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.next_tag.outputs.tag }}',
              name: '${{ steps.next_tag.outputs.tag }}',
              generate_release_notes: true,
            });
            console.log('Created release:', release.html_url);
