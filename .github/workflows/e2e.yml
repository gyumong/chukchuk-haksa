name: E2E (Playwright)

# PR마다 e2e 실행. playwright.config 의 webServer 가 `yarn dev` 를 띄워 self-serve 하고,
# 백엔드는 dev.api.cchaksa.com 으로 직접 간다(NEXT_PUBLIC_API_BASE_URL 미설정 → 폴백).
on:
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # CI=true 는 GitHub Actions 가 자동 주입 → playwright.config 가 reuseExistingServer=false 로,
      # Playwright 가 직접 `yarn dev` 를 띄우고 localhost:3000 을 기다린다.
      # SESSION_SECRET: iron-session seal/unseal 용. 32자 이상이면 되고, 같은 런 안에서만 일관되면 된다.
      #   (저장소 시크릿 E2E_SESSION_SECRET 추가 필요. 없으면 STAGING_SESSION_SECRET 로 대체 가능.)
      SESSION_SECRET: ${{ secrets.E2E_SESSION_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Get yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser (chromium)
        # 초기 안정화: CI는 chromium-web 만 실행한다. 안정화 후 webkit 추가 권장
        # (install 에 webkit, 아래 run 에서 --project 분리 제거).
        run: yarn playwright install --with-deps chromium

      - name: Run e2e tests
        # playwright.config 의 webServer 가 `yarn dev` 를 기동하고 baseURL 을 기다린다.
        run: yarn e2e --project=chromium-web

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (trace/screenshot/video)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
